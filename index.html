<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>EduChat | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
      body { 
        background: linear-gradient(135deg, #14284b 0%, #1e3b6e 100%); 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        margin: 0;
        padding: 20px;
      }
      .auth-container { width: 100%; max-width: 400px; }
      .auth-logo { text-align: center; margin-bottom: 32px; }
      .auth-logo .logo-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
      .auth-logo h1 { color: white; font-size: 2rem; font-weight: 700; }
      .auth-logo .ai-text { color: #10b981; }
      
      .modal-overlay { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
      .modal-overlay h2 { text-align: center; margin-bottom: 8px; color: #20242d; font-size: 1.5rem; }
      .modal-subtitle { text-align: center; color: #6b7280; margin-bottom: 24px; font-size: 0.9rem; }
      
      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; margin-bottom: 6px; color: #374151; font-weight: 500; font-size: 0.9rem; }
      .form-group input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; outline: none; }
      .form-group input:focus { border-color: #14284b; box-shadow: 0 0 0 3px rgba(20,40,75,0.1); }
      
      .password-hint { font-size: 0.75rem; color: #6b7280; margin-top: 4px; }
      
      .error-message { color: #dc2626; font-size: 0.85rem; margin-bottom: 12px; text-align: center; }
      .success-message { color: #059669; font-size: 0.85rem; margin-bottom: 12px; text-align: center; }
      
      .forgot-password { text-align: right; margin-bottom: 16px; }
      .forgot-password a { color: #10b981; text-decoration: none; font-size: 0.9rem; }
      
      .btn-primary { background: #14284b; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 500; width: 100%; transition: background 0.2s; }
      .btn-primary:hover { background: #1e3b6e; }
      .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
      
      .modal-footer-text { text-align: center; margin-top: 20px; color: #6b7280; font-size: 0.9rem; }
      .modal-footer-text a { color: #10b981; text-decoration: none; font-weight: 500; }
      .modal-footer-text a:hover { text-decoration: underline; }
      
      .loading { opacity: 0.6; pointer-events: none; }
      
      #signup-modal, #forgot-modal, #verification-modal { display: none; }
      
      @media (max-width: 480px) {
        body { padding: 15px; }
        .modal-overlay { padding: 24px; }
        .auth-logo h1 { font-size: 1.6rem; }
        .auth-logo .logo-icon { font-size: 2.5rem; }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">📖</div>
        <h1>EduChat <span class="ai-text">AI</span></h1>
      </div>

      <!-- Sign In Modal (visible by default) -->
      <div class="modal-overlay" id="signin-modal">
        <h2>Welcome Back</h2>
        <p class="modal-subtitle">Sign in to continue your learning journey</p>
        <div id="signin-error" class="error-message" style="display: none;"></div>
        <form id="signin-form">
          <div class="form-group">
            <label for="signin-email">Email</label>
            <input type="email" id="signin-email" required placeholder="you@university.edu">
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p class="modal-footer-text">Don't have an account? <a href="#" id="switch-to-signup">Sign Up</a></p>
      </div>

      <!-- Sign Up Modal (hidden) -->
      <div class="modal-overlay" id="signup-modal">
        <h2>Create Account</h2>
        <p class="modal-subtitle">Join EduChat and start mastering your subjects</p>
        <div id="signup-error" class="error-message" style="display: none;"></div>
        <div id="signup-success" class="success-message" style="display: none;"></div>
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" required placeholder="Your full name">
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required placeholder="you@university.edu">
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required placeholder="Create a password" minlength="8">
            <p class="password-hint">At least 8 characters, 1 uppercase, 1 lowercase, 1 number</p>
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" required placeholder="Confirm your password">
          </div>
          <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p class="modal-footer-text">Already have an account? <a href="#" id="switch-to-signin">Sign In</a></p>
      </div>
    </div>

    <script>
      const API_BASE = '';

      // Check if already logged in
      const token = localStorage.getItem('educhat_token');
      if (token) {
        window.location.href = 'chat.html';
      }

      // Modal switching
      document.getElementById('switch-to-signup').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('signin-modal').style.display = 'none';
        document.getElementById('signup-modal').style.display = 'block';
      });

      document.getElementById('switch-to-signin').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('signup-modal').style.display = 'none';
        document.getElementById('signin-modal').style.display = 'block';
      });

      // Sign In
      document.getElementById('signin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signin-email').value;
        const password = document.getElementById('signin-password').value;
        const errorDiv = document.getElementById('signin-error');
        const btn = e.target.querySelector('button');
        
        errorDiv.style.display = 'none';
        
        if (!email || !password) {
          errorDiv.textContent = 'Please fill in all fields';
          errorDiv.style.display = 'block';
          return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        
        try {
          const formData = new FormData();
          formData.append('email', email);
          formData.append('password', password);
          
          const response = await fetch(API_BASE + '/api/auth/login', {
            method: 'POST',
            body: formData
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            errorDiv.textContent = data.error || 'Login failed';
            errorDiv.style.display = 'block';
            return;
          }
          
          // Store token and user info
          localStorage.setItem('educhat_token', data.token);
          localStorage.setItem('educhat_user', JSON.stringify(data.user));
          localStorage.setItem('educhat_session', data.session_id);
          
          window.location.href = 'chat.html';
          
        } catch (err) {
          errorDiv.textContent = 'Network error. Please try again.';
          errorDiv.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      // Sign Up
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;
        const errorDiv = document.getElementById('signup-error');
        const successDiv = document.getElementById('signup-success');
        const btn = e.target.querySelector('button');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (password !== confirm) {
          errorDiv.textContent = 'Passwords do not match!';
          errorDiv.style.display = 'block';
          return;
        }
        
        if (password.length < 8) {
          errorDiv.textContent = 'Password must be at least 8 characters';
          errorDiv.style.display = 'block';
          return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        
        try {
          const formData = new FormData();
          formData.append('name', name);
          formData.append('email', email);
          formData.append('password', password);
          
          const response = await fetch(API_BASE + '/api/auth/signup', {
            method: 'POST',
            body: formData
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            errorDiv.textContent = data.error || 'Signup failed';
            errorDiv.style.display = 'block';
            return;
          }
          
          successDiv.textContent = data.message || 'Account created! Please check your email to verify.';
          successDiv.style.display = 'block';
          
          // Clear form
          e.target.reset();
          
          // Switch to sign in after a delay
          setTimeout(() => {
            document.getElementById('signup-modal').style.display = 'none';
            document.getElementById('signin-modal').style.display = 'block';
            successDiv.style.display = 'none';
          }, 3000);
          
        } catch (err) {
          errorDiv.textContent = 'Network error. Please try again.';
          errorDiv.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });
    </script>
  </body>
</html>
