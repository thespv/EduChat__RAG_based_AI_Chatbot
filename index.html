<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>EduChat | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: #0a0a18;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6c63ff 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: blobMove1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #00d4aa 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: blobMove2 10s ease-in-out infinite alternate;
    }

    @keyframes blobMove1 { from { transform: translate(0,0); } to { transform: translate(60px, 80px); } }
    @keyframes blobMove2 { from { transform: translate(0,0); } to { transform: translate(-50px, -60px); } }

    .auth-container { width: 100%; max-width: 420px; position: relative; z-index: 1; margin: auto; }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease;
    }
    @keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }

    .auth-logo .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 20px rgba(0,212,170,0.7));
    }

    .auth-logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #6c63ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .auth-logo .ai-text {
      background: linear-gradient(135deg, #00d4aa, #6c63ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-logo p {
      color: #7a7a9d;
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .modal-overlay {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(108,99,255,0.1);
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }

    .modal-overlay h2 {
      text-align: center;
      color: #e8e8f8;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-subtitle {
      text-align: center;
      color: #7a7a9d;
      margin-bottom: 28px;
      font-size: 0.88rem;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: #9a9abd;
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 12px;
      font-size: 0.95rem;
      color: #e8e8f8;
      outline: none;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .form-group input:focus {
      border-color: #6c63ff;
      background: rgba(108,99,255,0.08);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
    }

    .form-group input::placeholder { color: #4a4a6a; }

    .password-hint { font-size: 0.73rem; color: #5a5a7a; margin-top: 5px; }

    .error-message {
      background: rgba(255,77,109,0.12);
      border: 1px solid rgba(255,77,109,0.3);
      color: #ff6b8a;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .success-message {
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.3);
      color: #00d4aa;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      width: 100%;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(108,99,255,0.55);
    }

    .btn-primary:disabled {
      background: #2a2a45;
      color: #5a5a7a;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .modal-footer-text {
      text-align: center;
      margin-top: 22px;
      color: #5a5a7a;
      font-size: 0.88rem;
    }

    .modal-footer-text a {
      color: #6c63ff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .modal-footer-text a:hover { color: #00d4aa; }

    #signup-modal, #forgot-modal, #verification-modal { display: none; }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .modal-overlay { padding: 28px 22px; }
      .auth-logo h1 { font-size: 1.7rem; }
    }
  </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">📖</div>
        <h1>EduChat <span class="ai-text">AI</span></h1>
        <p>Your intelligent learning companion</p>
      </div>

      <!-- Sign In Modal (visible by default) -->
      <div class="modal-overlay" id="signin-modal">
        <h2>Welcome Back</h2>
        <p class="modal-subtitle">Sign in to continue your learning journey</p>
        <div id="signin-error" class="error-message" style="display: none;"></div>
        <form id="signin-form">
          <div class="form-group">
            <label for="signin-email">Email</label>
            <input type="email" id="signin-email" required placeholder="you@university.edu">
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p class="modal-footer-text">Don't have an account? <a href="#" id="switch-to-signup">Sign Up</a></p>
      </div>

      <!-- Sign Up Modal (hidden) -->
      <div class="modal-overlay" id="signup-modal">
        <h2>Create Account</h2>
        <p class="modal-subtitle">Join EduChat and start mastering your subjects</p>
        <div id="signup-error" class="error-message" style="display: none;"></div>
        <div id="signup-success" class="success-message" style="display: none;"></div>
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" required placeholder="Your full name">
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required placeholder="you@university.edu">
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required placeholder="Create a password" minlength="8">
            <p class="password-hint">At least 8 characters, 1 uppercase, 1 lowercase, 1 number</p>
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" required placeholder="Confirm your password">
          </div>
          <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p class="modal-footer-text">Already have an account? <a href="#" id="switch-to-signin">Sign In</a></p>
      </div>
    </div>

    <script>
      const API_BASE = '';

      // Check if already logged in
      const token = localStorage.getItem('educhat_token');
      if (token) {
        window.location.href = 'chat.html';
      }

      // Check for email verification success
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('verified') === 'true') {
        document.getElementById('signin-modal').style.display = 'block';
        const successDiv = document.createElement('div');
        successDiv.className = 'success-message';
        successDiv.textContent = 'Email verified! Please sign in to continue.';
        successDiv.style.cssText = 'background: #d1fae5; color: #065f46; padding: 12px; border-radius: 6px; margin-bottom: 16px; text-align: center;';
        document.getElementById('signin-form').insertBefore(successDiv, document.getElementById('signin-form').firstChild);
      }

      // Modal switching
      document.getElementById('switch-to-signup').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('signin-modal').style.display = 'none';
        document.getElementById('signup-modal').style.display = 'block';
      });

      document.getElementById('switch-to-signin').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('signup-modal').style.display = 'none';
        document.getElementById('signin-modal').style.display = 'block';
      });

      // Sign In
      document.getElementById('signin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signin-email').value;
        const password = document.getElementById('signin-password').value;
        const errorDiv = document.getElementById('signin-error');
        const btn = e.target.querySelector('button');
        
        errorDiv.style.display = 'none';
        
        if (!email || !password) {
          errorDiv.textContent = 'Please fill in all fields';
          errorDiv.style.display = 'block';
          return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        
        try {
          const formData = new FormData();
          formData.append('email', email);
          formData.append('password', password);
          
          const response = await fetch(API_BASE + '/api/auth/login', {
            method: 'POST',
            body: formData
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            errorDiv.textContent = data.error || 'Login failed';
            errorDiv.style.display = 'block';
            return;
          }
          
          // Store token and user info
          localStorage.setItem('educhat_token', data.token);
          localStorage.setItem('educhat_user', JSON.stringify(data.user));
          localStorage.setItem('educhat_session', data.session_id);
          
          window.location.href = 'chat.html';
          
        } catch (err) {
          errorDiv.textContent = 'Network error. Please try again.';
          errorDiv.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      // Sign Up
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;
        const errorDiv = document.getElementById('signup-error');
        const successDiv = document.getElementById('signup-success');
        const btn = e.target.querySelector('button');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (password !== confirm) {
          errorDiv.textContent = 'Passwords do not match!';
          errorDiv.style.display = 'block';
          return;
        }
        
        if (password.length < 8) {
          errorDiv.textContent = 'Password must be at least 8 characters';
          errorDiv.style.display = 'block';
          return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        
        try {
          const formData = new FormData();
          formData.append('name', name);
          formData.append('email', email);
          formData.append('password', password);
          
          const response = await fetch(API_BASE + '/api/auth/signup', {
            method: 'POST',
            body: formData
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            errorDiv.textContent = data.error || 'Signup failed';
            errorDiv.style.display = 'block';
            return;
          }
          
          successDiv.textContent = data.message || 'Account created! Please check your email to verify.';
          successDiv.style.display = 'block';
          
          // Clear form
          e.target.reset();
          
          // Switch to sign in after a delay
          setTimeout(() => {
            document.getElementById('signup-modal').style.display = 'none';
            document.getElementById('signin-modal').style.display = 'block';
            successDiv.style.display = 'none';
          }, 3000);
          
        } catch (err) {
          errorDiv.textContent = 'Network error. Please try again.';
          errorDiv.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });
    </script>
  </body>
</html>
